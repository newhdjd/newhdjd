<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - Gomoku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <header class="header">
            <h1 class="title">五子棋</h1>
            <p class="subtitle">Gomoku</p>
        </header>

        <main class="game-container">
            <aside class="sidebar left">
                <div class="player-card" id="player-black">
                    <div class="player-avatar black">●</div>
                    <div class="player-info">
                        <h3 class="player-name">黑棋</h3>
                        <p class="player-status">先手</p>
                    </div>
                    <div class="turn-indicator" id="turn-black"></div>
                </div>

                <div class="game-controls">
                    <button class="btn btn-primary" id="restart-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                        重新开始
                    </button>
                    <button class="btn btn-secondary" id="undo-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"/>
                            <path d="M21 17a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 13"/>
                        </svg>
                        悔棋
                    </button>
                </div>

                <div class="game-stats">
                    <h4>游戏统计</h4>
                    <div class="stat-item">
                        <span>总步数</span>
                        <span id="move-count">0</span>
                    </div>
                </div>
            </aside>

            <div class="board-container">
                <div class="board-wrapper">
                    <canvas id="board" class="board"></canvas>
                    <div class="board-overlay" id="board-overlay">
                        <div class="game-over-modal" id="game-over-modal">
                            <h2 id="winner-text">黑棋获胜！</h2>
                            <button class="btn btn-primary" id="play-again-btn">再来一局</button>
                        </div>
                    </div>
                </div>
                <div class="game-status" id="game-status">
                    <span class="status-text">黑棋先行</span>
                </div>
            </div>

            <aside class="sidebar right">
                <div class="player-card" id="player-white">
                    <div class="player-avatar white">●</div>
                    <div class="player-info">
                        <h3 class="player-name">白棋</h3>
                        <p class="player-status">后手</p>
                    </div>
                    <div class="turn-indicator" id="turn-white"></div>
                </div>

                <div class="chat-container">
                    <h4>聊天</h4>
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-message system">
                            <p>游戏开始！黑棋先行</p>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="输入消息..." maxlength="100">
                        <button class="btn-send" id="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
